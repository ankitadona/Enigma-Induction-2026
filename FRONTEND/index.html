<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enigma Coding Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
  <h1>Enigma</h1>
  <ul>
    <li><a href="#team">Team</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#blogs">Blogs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>Coding Club Enigma</h1>
</section>

<!-- Team -->
<section id="team">
  <h2>Our Team</h2>
  <div class="card-container" id="team-container"></div>
</section>

<!-- Projects -->
<section id="projects">
  <h2>Projects</h2>
  <div class="card-container" id="project-container"></div>
</section>

<!-- Blogs -->
<section id="blogs">
  <h2>Blogs</h2>
  <div id="blog-container"></div>
</section>

<!-- Contact -->
<section id="contact">
  <h2>Contact</h2>
  <form id="contactForm">
    <input type="text" placeholder="Name" id="name" required>
    <input type="email" placeholder="Email" id="email" required>
    <textarea placeholder="Message" id="message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
